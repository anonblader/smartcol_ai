# .github/workflows/deploy-classifier.yml
name: Deploy AI Classifier

on:
  push:
    branches: [main]
    paths:
      - 'classification-service/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./classification-service
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run tests
        working-directory: ./classification-service
        run: pytest

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'worksmart-ai-classifier'
          publish-profile: ${{ secrets.AZURE_CLASSIFIER_PUBLISH_PROFILE }}
          package: ./classification-service